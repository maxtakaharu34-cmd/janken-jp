<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#1a0030" />
<title>てんちょージャンケン</title>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+P+One&family=Kosugi+Maru&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body {
  font-family: "Kosugi Maru", system-ui, sans-serif; color: #fff;
  background: linear-gradient(180deg, #2a0050, #08010f);
  touch-action: manipulation; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#app { display: flex; flex-direction: column; height: 100dvh; padding: 10px 14px; gap: 10px; max-width: 480px; margin: 0 auto; }
header { display: flex; justify-content: space-between; align-items: center; }
.title {
  font-family: "Mochiy Pop P One", sans-serif; font-size: 20px;
  color: #ffe066; -webkit-text-stroke: 3px #000; paint-order: stroke fill;
  text-shadow: 3px 3px 0 #e8133a; margin: 0; transform: rotate(-2deg);
}
.icon-btn {
  background: rgba(255,255,255,0.1); border: 2px solid rgba(255,213,107,0.4);
  color: #ffe066; padding: 5px 10px; border-radius: 999px;
  font-size: 12px; cursor: pointer; font-family: inherit;
}
.score-bar {
  background: rgba(0,0,0,0.4); border: 2px solid rgba(255,213,107,0.3);
  border-radius: 12px; padding: 6px;
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  text-align: center; font-size: 10px; letter-spacing: 0.1em;
}
.score-bar .v { font-family: "Mochiy Pop P One", sans-serif; font-size: 16px; }
.score-bar .win .v  { color: #6dffb1; }
.score-bar .lose .v { color: #ff5577; }
.score-bar .draw .v { color: #ffe066; }
.versus {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; gap: 8px; min-height: 0; flex: 1;
}
.cpu, .me {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  position: relative;
  height: 100%; min-height: 0;
}
.cpu .label, .me .label {
  font-family: "Mochiy Pop P One", sans-serif; font-size: 11px;
  color: #ffe066; letter-spacing: 0.15em;
}
.cpu .pic {
  flex: 1; min-height: 0; aspect-ratio: 1; max-height: 220px;
  background: linear-gradient(135deg, #4a1f6e, #15082a);
  border: 3px solid #ffe066; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 64px; line-height: 1; position: relative; overflow: hidden;
  box-shadow: 0 0 12px rgba(255,213,107,0.3);
}
.cpu .pic.shake { animation: shake 0.4s ease-in-out 3; }
@keyframes shake {
  0%, 100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}
.cpu .pic .ueda {
  position: absolute; inset: 0;
  background: url('assets/ueda.png') center/contain no-repeat;
  opacity: 0.35;
}
.versus .vs {
  font-family: "Mochiy Pop P One", sans-serif; font-size: 24px;
  color: #ff5577; -webkit-text-stroke: 3px #000; paint-order: stroke fill;
  text-shadow: 2px 2px 0 #ffe066;
  transform: rotate(-8deg);
}
.me .pic {
  flex: 1; min-height: 0; aspect-ratio: 1; max-height: 220px;
  background: #000; border: 3px solid #6dffb1; border-radius: 14px;
  position: relative; overflow: hidden;
}
.me .pic video, .me .pic canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1);
}
.me .pic .placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #aaa; padding: 16px; text-align: center;
}
.me .gesture-tag {
  position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.7); color: #6dffb1; border: 1.5px solid #6dffb1;
  padding: 3px 10px; border-radius: 999px;
  font-family: "Mochiy Pop P One", sans-serif; font-size: 14px;
  white-space: nowrap; z-index: 5;
}
.banner {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; opacity: 0; transition: opacity 0.2s;
  z-index: 50;
}
.banner.show { opacity: 1; }
.banner .text {
  font-family: "Mochiy Pop P One", sans-serif;
  font-size: clamp(36px, 12vw, 60px);
  color: #ffe066; -webkit-text-stroke: 5px #000; paint-order: stroke fill;
  text-shadow: 4px 4px 0 #e8133a, 8px 8px 0 #000;
}
.banner.win  .text { color: #6dffb1; }
.banner.lose .text { color: #ff5577; }
.banner.draw .text { color: #ffe066; }
.bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.bottom button {
  background: #ffe066; color: #000; border: 3px solid #000;
  padding: 12px;
  font-family: "Mochiy Pop P One", sans-serif; font-size: 14px;
  border-radius: 14px; cursor: pointer; box-shadow: 3px 3px 0 #000;
}
.bottom button.start { background: #ff5577; color: #fff; }
.bottom button:disabled { opacity: 0.5; cursor: not-allowed; }
.bottom button:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #000; }
.note { font-size: 9px; opacity: 0.65; text-align: center; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1 class="title">てんちょージャンケン</h1>
    <button class="icon-btn" id="btn-reset">↺</button>
  </header>
  <div class="score-bar">
    <div class="win"><div>WIN</div><div class="v" id="s-win">0</div></div>
    <div class="draw"><div>DRAW</div><div class="v" id="s-draw">0</div></div>
    <div class="lose"><div>LOSE</div><div class="v" id="s-lose">0</div></div>
  </div>
  <div class="versus">
    <div class="cpu">
      <div class="label">てんちょー</div>
      <div class="pic" id="cpu-pic">
        <div class="ueda"></div>
        <span id="cpu-em" style="position:relative">❓</span>
      </div>
    </div>
    <div class="vs">VS</div>
    <div class="me">
      <div class="label">あなた</div>
      <div class="pic" id="me-pic">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="hand"></canvas>
        <div class="placeholder" id="ph">📷 開始ボタンで<br/>カメラ起動</div>
        <div class="gesture-tag" id="g-tag" style="display:none;">—</div>
      </div>
    </div>
  </div>
  <div class="bottom">
    <button id="btn-start" class="start">📷 開始</button>
    <button id="btn-go" disabled>✊✌🖐 ジャンケン！</button>
  </div>
  <div class="note">手をカメラに見せて、ボタンで一斉に出す！</div>
</div>
<div class="banner" id="banner"><div class="text" id="b-text"></div></div>
<script type="module">
import { HandLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs';
const $ = (id) => document.getElementById(id);
const video = $('video');
const handCanvas = $('hand');
const hctx = handCanvas.getContext('2d');
const tag = $('g-tag');
const cpuEm = $('cpu-em');
const banner = $('banner');
const bText = $('b-text');
const SHARE_URL = 'https://maxtakaharu34-cmd.github.io/janken-jp/';

let model = null, stream = null, running = false;
let lastGesture = '?';
let scores = { win: 0, draw: 0, lose: 0 };

async function load() {
  const fileset = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm'
  );
  model = await HandLandmarker.createFromOptions(fileset, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
      delegate: 'GPU'
    },
    numHands: 1,
    runningMode: 'VIDEO'
  });
}

async function startCam() {
  $('ph').style.display = 'none';
  if (stream) stream.getTracks().forEach((t) => t.stop());
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 480 } },
    audio: false
  });
  video.srcObject = stream;
  await new Promise((r) => video.onloadedmetadata = r);
  await video.play();
  if (!model) await load();
  running = true;
  $('btn-go').disabled = false;
  $('btn-start').textContent = '🛑 停止';
  loop();
}
function stopCam() {
  running = false;
  if (stream) { stream.getTracks().forEach((t) => t.stop()); stream = null; }
  $('btn-go').disabled = true;
  $('btn-start').textContent = '📷 開始';
  $('ph').style.display = '';
  tag.style.display = 'none';
  hctx.clearRect(0, 0, handCanvas.width, handCanvas.height);
}

// Detect rock/scissors/paper from 21 hand landmarks.
// Landmarks indexed per MediaPipe; tips are 4 (thumb), 8, 12, 16, 20.
function classify(lm) {
  const wrist = lm[0];
  const fingerUp = (tipIdx, pipIdx) => {
    // y is downward in image coords; tip above pip = tip.y < pip.y
    return lm[tipIdx].y < lm[pipIdx].y - 0.02;
  };
  const thumbExt = (() => {
    // thumb extends sideways — distance from wrist vs IP joint distance
    const dx1 = lm[4].x - wrist.x, dy1 = lm[4].y - wrist.y;
    const dx2 = lm[2].x - wrist.x, dy2 = lm[2].y - wrist.y;
    return Math.hypot(dx1, dy1) > Math.hypot(dx2, dy2) * 1.15;
  })();
  const idx = fingerUp(8, 6);
  const mid = fingerUp(12, 10);
  const ring = fingerUp(16, 14);
  const pin = fingerUp(20, 18);
  const upCount = (idx ? 1 : 0) + (mid ? 1 : 0) + (ring ? 1 : 0) + (pin ? 1 : 0);
  // Heuristic
  if (upCount === 0) return 'rock';
  if (upCount === 2 && idx && mid && !ring && !pin) return 'scissors';
  if (upCount >= 3) return 'paper';
  if (upCount === 1 && idx) return 'scissors'; // forgive 1-finger as scissors-ish
  return '?';
}

const G = { rock: '✊', scissors: '✌️', paper: '🖐', '?': '❓' };
const LABELS = { rock: 'グー', scissors: 'チョキ', paper: 'パー', '?': '？' };

function loop() {
  if (!running) return;
  if (video.readyState >= 2 && model) {
    handCanvas.width = video.videoWidth || 480;
    handCanvas.height = video.videoHeight || 480;
    const res = model.detectForVideo(video, performance.now());
    hctx.clearRect(0, 0, handCanvas.width, handCanvas.height);
    if (res.landmarks && res.landmarks[0]) {
      const lm = res.landmarks[0];
      // draw fingertip dots
      hctx.fillStyle = '#6dffb1';
      for (const p of lm) {
        hctx.beginPath();
        hctx.arc(p.x * handCanvas.width, p.y * handCanvas.height, 4, 0, Math.PI * 2);
        hctx.fill();
      }
      lastGesture = classify(lm);
    } else {
      lastGesture = '?';
    }
    tag.style.display = '';
    tag.textContent = G[lastGesture] + ' ' + LABELS[lastGesture];
  }
  requestAnimationFrame(loop);
}

function showBanner(t, cls, ms = 1100) {
  bText.textContent = t;
  banner.classList.remove('win', 'lose', 'draw');
  if (cls) banner.classList.add(cls);
  banner.classList.add('show');
  clearTimeout(showBanner._t);
  showBanner._t = setTimeout(() => banner.classList.remove('show'), ms);
}

function play() {
  if (!running) return;
  const me = lastGesture;
  if (me === '?') { showBanner('手をしっかり出して！', 'draw', 800); return; }
  // てんちょー is unfair: 5% chance to match exactly = draw, 30% to slightly favor losing :)
  // Just random for now
  const choices = ['rock', 'scissors', 'paper'];
  const cpu = choices[Math.floor(Math.random() * 3)];
  // Animate CPU thinking
  const pic = $('cpu-pic');
  pic.classList.remove('shake'); void pic.offsetWidth; pic.classList.add('shake');
  let i = 0;
  const ticker = setInterval(() => {
    cpuEm.textContent = G[choices[i % 3]];
    i++;
  }, 90);
  setTimeout(() => {
    clearInterval(ticker);
    cpuEm.textContent = G[cpu];
    const r = result(me, cpu);
    if (r === 'win')  { scores.win++;  showBanner('てんちょー、参った！', 'win'); }
    if (r === 'lose') { scores.lose++; showBanner('てんちょーの勝ち！', 'lose'); }
    if (r === 'draw') { scores.draw++; showBanner('あいこ…！', 'draw'); }
    updateScores();
  }, 1100);
}
function result(me, cpu) {
  if (me === cpu) return 'draw';
  if ((me === 'rock' && cpu === 'scissors') ||
      (me === 'scissors' && cpu === 'paper') ||
      (me === 'paper' && cpu === 'rock')) return 'win';
  return 'lose';
}
function updateScores() {
  $('s-win').textContent = scores.win;
  $('s-draw').textContent = scores.draw;
  $('s-lose').textContent = scores.lose;
}

$('btn-start').addEventListener('click', () => running ? stopCam() : startCam().catch(() => {
  $('ph').textContent = 'カメラ起動失敗 / 許可してね';
  $('ph').style.display = '';
}));
$('btn-go').addEventListener('click', play);
$('btn-reset').addEventListener('click', () => {
  scores = { win: 0, draw: 0, lose: 0 };
  updateScores();
});
</script>
</body>
</html>
