<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body {
  font-family: "Kosugi Maru", system-ui, sans-serif; color: #fff;
  background: linear-gradient(180deg, #2a0050, #08010f);
  touch-action: manipulation; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#app { display: flex; flex-direction: column; height: 100dvh; padding: 10px 14px; gap: 10px; max-width: 480px; margin: 0 auto; }
header { display: flex; justify-content: space-between; align-items: center; }
.title {
  font-family: "Mochiy Pop P One", sans-serif; font-size: 20px;
  color: #ffe066; -webkit-text-stroke: 3px #000; paint-order: stroke fill;
  text-shadow: 3px 3px 0 #e8133a; margin: 0; transform: rotate(-2deg);
}
.icon-btn {
  background: rgba(255,255,255,0.1); border: 2px solid rgba(255,213,107,0.4);
  color: #ffe066; padding: 5px 10px; border-radius: 999px;
  font-size: 12px; cursor: pointer; font-family: inherit;
}
.score-bar {
  background: rgba(0,0,0,0.4); border: 2px solid rgba(255,213,107,0.3);
  border-radius: 12px; padding: 6px;
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  text-align: center; font-size: 10px; letter-spacing: 0.1em;
}
.score-bar .v { font-family: "Mochiy Pop P One", sans-serif; font-size: 16px; }
.score-bar .win .v  { color: #6dffb1; }
.score-bar .lose .v { color: #ff5577; }
.score-bar .draw .v { color: #ffe066; }
.versus {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; gap: 8px; min-height: 0; flex: 1;
}
.cpu, .me {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  position: relative;
  height: 100%; min-height: 0;
}
.cpu .label, .me .label {
  font-family: "Mochiy Pop P One", sans-serif; font-size: 11px;
  color: #ffe066; letter-spacing: 0.15em;
}
.cpu .pic {
  flex: 1; min-height: 0; aspect-ratio: 1; max-height: 220px;
  background: linear-gradient(135deg, #4a1f6e, #15082a);
  border: 3px solid #ffe066; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 64px; line-height: 1; position: relative; overflow: hidden;
  box-shadow: 0 0 12px rgba(255,213,107,0.3);
}
.cpu .pic.shake { animation: shake 0.4s ease-in-out 3; }
@keyframes shake {
  0%, 100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}
.cpu .pic .ueda {
  position: absolute; inset: 0;
  background: url('assets/ueda.png') center/contain no-repeat;
  opacity: 0.35;
}
.versus .vs {
  font-family: "Mochiy Pop P One", sans-serif; font-size: 24px;
  color: #ff5577; -webkit-text-stroke: 3px #000; paint-order: stroke fill;
  text-shadow: 2px 2px 0 #ffe066;
  transform: rotate(-8deg);
}
.me .pic {
  flex: 1; min-height: 0; aspect-ratio: 1; max-height: 220px;
  background: #000; border: 3px solid #6dffb1; border-radius: 14px;
  position: relative; overflow: hidden;
}
.me .pic video, .me .pic canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1);
}
.me .pic .placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #aaa; padding: 16px; text-align: center;
}
.me .gesture-tag {
  position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.7); color: #6dffb1; border: 1.5px solid #6dffb1;
  padding: 3px 10px; border-radius: 999px;
  font-family: "Mochiy Pop P One", sans-serif; font-size: 14px;
  white-space: nowrap; z-index: 5;
}
.banner {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; opacity: 0; transition: opacity 0.2s;
  z-index: 50;
  background: rgba(0,0,0,0);
  flex-direction: column; gap: 12px;
}
.banner.show { opacity: 1; }
.banner.win  { background: rgba(40,180,90,0.45); }
.banner.lose { background: rgba(180,30,60,0.45); }
.banner.draw { background: rgba(180,160,40,0.35); }
.banner .text {
  font-family: "Mochiy Pop P One", sans-serif;
  font-size: clamp(46px, 16vw, 80px);
  color: #ffe066; -webkit-text-stroke: 6px #000; paint-order: stroke fill;
  text-shadow: 4px 4px 0 #e8133a, 10px 10px 0 #000;
  animation: bannerPop 0.45s cubic-bezier(.2,.9,.2,1);
}
.banner.win  .text { color: #6dffb1; text-shadow: 4px 4px 0 #1c8a4a, 10px 10px 0 #000; }
.banner.lose .text { color: #ff5577; text-shadow: 4px 4px 0 #6a0a18, 10px 10px 0 #000; }
.banner.draw .text { color: #ffe066; }
@keyframes bannerPop {
  0%   { transform: scale(0.3) rotate(-10deg); opacity: 0; }
  60%  { transform: scale(1.2) rotate(4deg); opacity: 1; }
  100% { transform: scale(1) rotate(-2deg); }
}
.banner .vs-row {
  display: flex; align-items: center; justify-content: center; gap: 16px;
  font-family: "Mochiy Pop P One", sans-serif; font-size: 36px;
  background: rgba(0,0,0,0.6); padding: 8px 18px; border-radius: 999px;
  border: 3px solid #ffe066;
  animation: bannerPop 0.45s 0.15s cubic-bezier(.2,.9,.2,1) backwards;
}
.banner .vs-row .you { color: #6dffb1; }
.banner .vs-row .cpu { color: #ff5577; }
.banner .vs-row .vs  { color: #ffe066; font-size: 18px; }
.banner .sub {
  font-family: "Mochiy Pop P One", sans-serif; font-size: 16px;
  color: #fff; text-shadow: 2px 2px 0 #000;
  background: rgba(0,0,0,0.5); padding: 4px 14px; border-radius: 999px;
  animation: bannerPop 0.45s 0.3s cubic-bezier(.2,.9,.2,1) backwards;
}

/* Countdown overlay */
.countdown {
  position: fixed; inset: 0; pointer-events: none;
  display: flex; align-items: center; justify-content: center;
  z-index: 40; opacity: 0;
}
.countdown.show { opacity: 1; }
.countdown .step {
  font-family: "Mochiy Pop P One", sans-serif;
  font-size: clamp(70px, 22vw, 130px);
  color: #ffe066; -webkit-text-stroke: 8px #000; paint-order: stroke fill;
  text-shadow: 6px 6px 0 #e8133a;
  animation: countPop 0.45s ease-out;
}
@keyframes countPop {
  0%   { transform: scale(0.3) rotate(-15deg); opacity: 0; }
  40%  { transform: scale(1.25) rotate(6deg); opacity: 1; }
  100% { transform: scale(1) rotate(-3deg); opacity: 1; }
}
.bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.bottom button {
  background: #ffe066; color: #000; border: 3px solid #000;
  padding: 12px;
  font-family: "Mochiy Pop P One", sans-serif; font-size: 14px;
  border-radius: 14px; cursor: pointer; box-shadow: 3px 3px 0 #000;
}
.bottom button.start { background: #ff5577; color: #fff; }
.bottom button:disabled { opacity: 0.5; cursor: not-allowed; }
.bottom button:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #000; }
.note { font-size: 9px; opacity: 0.65; text-align: center; }
</style>

<body>
<div id="app">
  <header>
    <h1 class="title">てんちょージャンケン</h1>
    <button class="icon-btn" id="btn-reset">↺</button>
  </header>
  <div class="score-bar">
    <div class="win"><div>WIN</div><div class="v" id="s-win">0</div></div>
    <div class="draw"><div>DRAW</div><div class="v" id="s-draw">0</div></div>
    <div class="lose"><div>LOSE</div><div class="v" id="s-lose">0</div></div>
  </div>
  <div class="versus">
    <div class="cpu">
      <div class="label">てんちょー</div>
      <div class="pic" id="cpu-pic">
        <div class="ueda"></div>
        <span id="cpu-em" style="position:relative">❓</span>
      </div>
    </div>
    <div class="vs">VS</div>
    <div class="me">
      <div class="label">あなた</div>
      <div class="pic" id="me-pic">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="hand"></canvas>
        <div class="placeholder" id="ph">📷 開始ボタンで<br/>カメラ起動</div>
        <div class="gesture-tag" id="g-tag" style="display:none;">—</div>
      </div>
    </div>
  </div>
  <div class="bottom">
    <button id="btn-start" class="start">📷 開始</button>
    <button id="btn-go" disabled>✊✌🖐 ジャンケン！</button>

  <div class="note">手をカメラに見せて、ボタンで一斉に出す！</div>
</div>
<div class="banner" id="banner">
  <div class="text" id="b-text"></div>
  <div class="vs-row" id="b-vs" style="display:none">
    <span class="you" id="b-you">✊</span>
    <span class="vs">VS</span>
    <span class="cpu" id="b-cpu">✊</span>
  </div>
  <div class="sub" id="b-sub" style="display:none"></div>
</div>
<div class="countdown" id="countdown"><div class="step" id="cd-step">!</div></div>
<script type="module">
import { HandLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs';
const $ = (id) => document.getElementById(id);

// ---------- WebAudio SE ----------
const Sound = (() => {
  let ac = null;
  const en = () => { if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)(); if (ac.state === 'suspended') ac.resume(); return ac; };
  const beep = (f, d, t = 'square', g = 0.14) => {
    const a = en();
    const o = a.createOscillator(); const gn = a.createGain();
    o.type = t; o.frequency.value = f; gn.gain.value = g;
    gn.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + d);
    o.connect(gn).connect(a.destination); o.start(); o.stop(a.currentTime + d);
  };
  const slide = (f1, f2, d, t = 'sawtooth', g = 0.16) => {
    const a = en();
    const o = a.createOscillator(); const gn = a.createGain();
    o.type = t;
    o.frequency.setValueAtTime(f1, a.currentTime);
    o.frequency.exponentialRampToValueAtTime(f2, a.currentTime + d);
    gn.gain.value = g;
    gn.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + d);
    o.connect(gn).connect(a.destination); o.start(); o.stop(a.currentTime + d);
  };
  return {
    prime: en,
    // "ジャン" "ケン" "ポン" — three rising notes, distinct
    jan:  () => beep(440, 0.18, 'square', 0.18),
    ken:  () => beep(523, 0.18, 'square', 0.18),
    pon:  () => beep(700, 0.22, 'square', 0.20),
    // Win = bright fanfare ascent
    win:  () => {
      [523, 659, 784, 1047, 1318].forEach((f, i) =>
        setTimeout(() => beep(f, 0.18, 'triangle', 0.2), i * 90));
      setTimeout(() => beep(1568, 0.4, 'triangle', 0.18), 500);
    },
    // Lose = trombone-style descent
    lose: () => {
      slide(440, 110, 0.6, 'sawtooth', 0.22);
      setTimeout(() => beep(110, 0.3, 'sawtooth', 0.18), 600);
    },
    // Draw = neutral two-note
    draw: () => { beep(523, 0.16, 'triangle', 0.16); setTimeout(() => beep(523, 0.16, 'triangle', 0.16), 200); }
  };
})();
const video = $('video');
const handCanvas = $('hand');
const hctx = handCanvas.getContext('2d');
const tag = $('g-tag');
const cpuEm = $('cpu-em');
const banner = $('banner');
const bText = $('b-text');
const SHARE_URL = 'https://maxtakaharu34-cmd.github.io/janken-jp/';

let model = null, stream = null, running = false;
let lastGesture = '?';
let scores = { win: 0, draw: 0, lose: 0 };

async function load() {
  const fileset = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm'
  );
  model = await HandLandmarker.createFromOptions(fileset, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
      delegate: 'GPU'
    },
    numHands: 1,
    runningMode: 'VIDEO'
  });
}

async function startCam() {
  $('ph').style.display = 'none';
  if (stream) stream.getTracks().forEach((t) => t.stop());
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 480 } },
    audio: false
  });
  video.srcObject = stream;
  await new Promise((r) => video.onloadedmetadata = r);
  await video.play();
  if (!model) await load();
  running = true;
  $('btn-go').disabled = false;
  $('btn-start').textContent = '🛑 停止';
  loop();
}
function stopCam() {
  running = false;
  if (stream) { stream.getTracks().forEach((t) => t.stop()); stream = null; }
  $('btn-go').disabled = true;
  $('btn-start').textContent = '📷 開始';
  $('ph').style.display = '';
  tag.style.display = 'none';
  hctx.clearRect(0, 0, handCanvas.width, handCanvas.height);
}

// Detect rock/scissors/paper from 21 hand landmarks.
// Landmarks indexed per MediaPipe; tips are 4 (thumb), 8, 12, 16, 20.
function classify(lm) {
  const wrist = lm[0];
  const fingerUp = (tipIdx, pipIdx) => {
    // y is downward in image coords; tip above pip = tip.y < pip.y
    return lm[tipIdx].y < lm[pipIdx].y - 0.02;
  };
  const thumbExt = (() => {
    // thumb extends sideways — distance from wrist vs IP joint distance
    const dx1 = lm[4].x - wrist.x, dy1 = lm[4].y - wrist.y;
    const dx2 = lm[2].x - wrist.x, dy2 = lm[2].y - wrist.y;
    return Math.hypot(dx1, dy1) > Math.hypot(dx2, dy2) * 1.15;
  })();
  const idx = fingerUp(8, 6);
  const mid = fingerUp(12, 10);
  const ring = fingerUp(16, 14);
  const pin = fingerUp(20, 18);
  const upCount = (idx ? 1 : 0) + (mid ? 1 : 0) + (ring ? 1 : 0) + (pin ? 1 : 0);
  // Heuristic
  if (upCount === 0) return 'rock';
  if (upCount === 2 && idx && mid && !ring && !pin) return 'scissors';
  if (upCount >= 3) return 'paper';
  if (upCount === 1 && idx) return 'scissors'; // forgive 1-finger as scissors-ish
  return '?';
}

const G = { rock: '✊', scissors: '✌️', paper: '🖐', '?': '❓' };
const LABELS = { rock: 'グー', scissors: 'チョキ', paper: 'パー', '?': '？' };

function loop() {
  if (!running) return;
  if (video.readyState >= 2 && model) {
    handCanvas.width = video.videoWidth || 480;
    handCanvas.height = video.videoHeight || 480;
    const res = model.detectForVideo(video, performance.now());
    hctx.clearRect(0, 0, handCanvas.width, handCanvas.height);
    if (res.landmarks && res.landmarks[0]) {
      const lm = res.landmarks[0];
      // draw fingertip dots
      hctx.fillStyle = '#6dffb1';
      for (const p of lm) {
        hctx.beginPath();
        hctx.arc(p.x * handCanvas.width, p.y * handCanvas.height, 4, 0, Math.PI * 2);
        hctx.fill();
      }
      lastGesture = classify(lm);
    } else {
      lastGesture = '?';
    }
    tag.style.display = '';
    tag.textContent = G[lastGesture] + ' ' + LABELS[lastGesture];
  }
  requestAnimationFrame(loop);
}

function showBanner(t, cls, opts = {}) {
  bText.textContent = t;
  banner.classList.remove('win', 'lose', 'draw');
  if (cls) banner.classList.add(cls);
  // Show me-vs-cpu row + sub message when provided
  const vs = $('b-vs'); const sub = $('b-sub');
  if (opts.you && opts.cpu) {
    $('b-you').textContent = opts.you;
    $('b-cpu').textContent = opts.cpu;
    vs.style.display = '';
  } else { vs.style.display = 'none'; }
  if (opts.sub) {
    sub.textContent = opts.sub;
    sub.style.display = '';
  } else { sub.style.display = 'none'; }
  banner.classList.add('show');
  clearTimeout(showBanner._t);
  showBanner._t = setTimeout(() => banner.classList.remove('show'), opts.ms || 1900);
}

// Countdown 「ジャン・ケン・ポン！」
function countdown(steps, callback) {
  const cd = $('countdown');
  const stepEl = $('cd-step');
  let i = 0;
  cd.classList.add('show');
  const fns = [Sound.jan, Sound.ken, Sound.pon];
  const tick = () => {
    if (i >= steps.length) {
      cd.classList.remove('show');
      callback();
      return;
    }
    stepEl.textContent = steps[i];
    // restart animation
    stepEl.style.animation = 'none';
    void stepEl.offsetWidth;
    stepEl.style.animation = '';
    if (fns[i]) fns[i]();
    i++;
    setTimeout(tick, 600);
  };
  tick();
}

function play() {
  if (!running) return;
  Sound.prime();
  const me = lastGesture;
  if (me === '?') { showBanner('手をしっかり出して！', 'draw', { ms: 900 }); return; }
  // Disable button during sequence
  $('btn-go').disabled = true;
  // Animate CPU thinking shake
  const pic = $('cpu-pic');
  pic.classList.remove('shake'); void pic.offsetWidth; pic.classList.add('shake');
  const choices = ['rock', 'scissors', 'paper'];
  let ti = 0;
  const ticker = setInterval(() => {
    cpuEm.textContent = G[choices[ti % 3]];
    ti++;
  }, 100);
  countdown(['ジャン', 'ケン', 'ポン！'], () => {
    clearInterval(ticker);
    const cpu = choices[Math.floor(Math.random() * 3)];
    cpuEm.textContent = G[cpu];
    const r = result(me, cpu);
    const meEm = G[me], cpuEmoji = G[cpu];
    if (r === 'win')  {
      scores.win++;
      Sound.win();
      showBanner('🎉 あなたの勝ち！', 'win', {
        you: meEm, cpu: cpuEmoji,
        sub: `${LABELS[me]} は ${LABELS[cpu]} に勝つ！`,
        ms: 2200
      });
    } else if (r === 'lose') {
      scores.lose++;
      Sound.lose();
      showBanner('💀 あなたの負け…', 'lose', {
        you: meEm, cpu: cpuEmoji,
        sub: `${LABELS[cpu]} に負けた…`,
        ms: 2200
      });
    } else {
      scores.draw++;
      Sound.draw();
      showBanner('🤝 あいこ', 'draw', {
        you: meEm, cpu: cpuEmoji,
        sub: 'もう一回！',
        ms: 1600
      });
    }
    updateScores();
    setTimeout(() => { $('btn-go').disabled = false; }, 600);
  });
}
function result(me, cpu) {
  if (me === cpu) return 'draw';
  if ((me === 'rock' && cpu === 'scissors') ||
      (me === 'scissors' && cpu === 'paper') ||
      (me === 'paper' && cpu === 'rock')) return 'win';
  return 'lose';
}
function updateScores() {
  $('s-win').textContent = scores.win;
  $('s-draw').textContent = scores.draw;
  $('s-lose').textContent = scores.lose;
}

$('btn-start').addEventListener('click', () => running ? stopCam() : startCam().catch(() => {
  $('ph').textContent = 'カメラ起動失敗 / 許可してね';
  $('ph').style.display = '';
}));
$('btn-go').addEventListener('click', play);
$('btn-reset').addEventListener('click', () => {
  scores = { win: 0, draw: 0, lose: 0 };
  updateScores();
});
</script>
